/* =========================
   DOM
========================= */
const cards=document.querySelectorAll(".game-card");

const sidebar=document.querySelector(".sidebar");
const sidebarSlot=document.querySelector(".sidebar-slot");

const eventList=document.querySelector(".event-list");

const closeBtn=document.querySelector(".close-btn");

const content=document.querySelector(".content");
const eventContent=document.querySelector(".event-content");

const noEvent=document.getElementById("no-event");

const grid=document.getElementById("event-grid");

const pagination=document.getElementById("pagination");

let currentEvents=[];

let currentPage=1;

const pageSize=6;


/* =========================
   CLICK EVENT CARD
========================= */
cards.forEach((card,i)=>{
  card.addEventListener("click",()=>{
    /* UI SWITCH */
    eventList.classList.add("hide");

    sidebar.classList.add("show");

    closeBtn.classList.add("show");

    content.classList.add("show");

    /* RENDER SIDEBAR ICON */
    renderSidebar(i);

    /* UPDATE CONTENT */
    if(map[i].category==="all"){
      showAll();
    }else{
    updateContent(map[i]);
    }
  });
});


/* =========================
   RENDER SIDEBAR
========================= */
function renderSidebar(activeIndex){

  sidebarSlot.innerHTML="";

  map.forEach((data,index)=>{

    const icon=document.createElement("div");

    icon.className="sidebar-icon";

    if(index === activeIndex){
      icon.classList.add("active");
    }

       /* 统一结构（不再用 all-btn） */
    if(data.category==="all"){

      icon.innerHTML=`
      <span>ALL</span>
        `;
    }else{
    icon.innerHTML=`
    <img src="${data.icon}">
    `;
    }

      /* CLICK SIDEBAR ICON */
      icon.addEventListener("click",()=>{

        document
        .querySelectorAll(".sidebar-icon")
        .forEach(e1 => e1.classList.remove("active"));

        icon.classList.add("active");

        if(data.category==="all"){
          showAll();
        }else{
        updateContent(data);
        }
        });

        sidebarSlot.appendChild(icon);
      });
  }

/* =========================
 UPDATE CONTENT
========================= */
function updateContent(data){

  currentEvents=data.events || [];
  currentPage=1;

  renderEvents(currentEvents);

}

/* =========================
   SHOW ALL
========================= */
function showAll(){

  currentEvents=map
  .filter(item=>item.category!=="all")
  .flatMap(item=>item.events || []);

  currentPage=1;

  renderEvents(currentEvents);
}

/* =========================
   RENDER EVENTS（核心渲染函数）
========================= */
function renderEvents(events){

  const totalPages=Math.ceil(events.length / pageSize);


   // EMPTY STATE
   if(events.length===0){
    noEvent.style.display="flex";
    grid.innerHTML="";
    pagination.innerHTML="";
    return;
   }

   noEvent.style.display="none";

   // 当前页数据
   const start=(currentPage - 1)* pageSize;

   const end=start + pageSize;
   
   const pageEvents=events.slice(start,end);

 // 渲染卡片
  grid.innerHTML=pageEvents.map(event=>`
  <div class="event-card">
    <h2 class="event-title">
    ${event.title}
    </h2>
    <div class="divider"></div>
    <p class="event-date">
      ${event.date}
      </p>
      </div>
      `).join("");

      renderPagination(totalPages);

 /* =========================
     CLICK EVENT CARD
  ========================= */
document.querySelectorAll(".event-card")
.forEach((card,index)=>{

  card.addEventListener("click",()=>{

    window.location.href=
    pageEvents[index].link;
  });
});
renderPagination(totalPages);
}


/* =========================
   CLOSE BUTTON
========================= */
closeBtn.addEventListener("click",()=>{

  eventList.classList.remove("hide");

  sidebar.classList.remove("show");

  closeBtn.classList.remove("show");

  content.classList.remove("show");

});

function renderPagination(totalPages){
  pagination.innerHTML="";

  if(totalPages<=1)return;

    // 《 -3页
    const jumpPrev=document.createElement("button");
    jumpPrev.innerText="《";
    jumpPrev.addEventListener("click",()=>{
      currentPage=Math.max(1, currentPage - 3);
      renderEvents(currentEvents);
    });
    pagination.appendChild(jumpPrev);

      // < 上一页
const prev=document.createElement("button");
prev.innerText="<"
prev.addEventListener("click",()=>{
  if(currentPage > 1){
    currentPage--;
    renderEvents(currentEvents);
  }
});
pagination.appendChild(prev);

 /* =========================
     PAGE RANGE
  ========================= */
 // 页码范围（最多5个）
 let startPage=Math.max(1, currentPage - 2);
 let endPage=startPage + 4;

   // PREVENT OVERFLOW
 if(endPage > totalPages){

  endPage=totalPages;

  startPage=Math.max(1 , endPage - 4);
 }

   /* =========================
     PAGE BUTTONS
  ========================= */
  for(let i=startPage; i<=endPage;i++){

    const btn=document.createElement("button");

    btn.innerText=i;

     // ACTIVE PAGE
     if(i === currentPage){
      btn.classList.add("active-page");
     }

    // CLICK PAGE
    btn.addEventListener("click",()=>{
      currentPage=i;

      renderEvents(currentEvents);
    });

    pagination.appendChild(btn);
  }

  /* =========================
     DOTS + LAST PAGE
  ========================= */
  if(endPage < totalPages){
    const dots=document.createElement('span');

    dots.className="dots";

    dots.innerText="......";

    pagination.appendChild(dots);

    const last=document.createElement("button");

    last.innerText=totalPages;

    last.addEventListener("click",()=>{

      currentPage=totalPages;

      renderEvents(currentEvents);
    });

    pagination.appendChild(last);
  }

    /* =========================
     > NEXT PAGE
  ========================= */
  const next=document.createElement("button");

  next.innerHTML=">";

  next.addEventListener('click',()=>{

    if(currentPage < totalPages){

      currentPage++;

      renderEvents(currentEvents);
    }
  });

  pagination.appendChild(next);

    /* =========================
     》 JUMP NEXT 3 PAGE
  ========================= */
  const jumpNext=document.createElement("button");

  jumpNext.innerText="》";

  jumpNext.addEventListener("click",()=>{

    currentPage=
    Math.min(totalPages,currentPage + 3);

    renderEvents(currentEvents);
  });
  pagination.appendChild(jumpNext);
}
