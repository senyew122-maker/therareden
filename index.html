 <div class="slider-box">

 </div>
  <div class="dots">
     <span class="dot"onclick="setImage(0)">●</span>
     <span class="dot"onclick="setImage(1)">●</span>
      <span class="dot"onclick="setImage(2)">●</span>
       <span class="dot"onclick="setImage(3)">●</span>
       <span class="dot"onclick="setImage(4)">●</span>

</div>

 <script>
  const image=[
    "123/rare-den.jpg",
    "123/Ga.jpg",
    "123/Optcg.jpg",
    "123/Ua.jpg",
    "123/Ptcg.jpg"
  ];

  let current=0;

  function showImage(index){
    document.getElementById("slider").src=image[index];

  const dot=document.getElementsByClassName("dot");
  for(let i=0;i<dot.length;i++){
    dot[i].classList.remove("active");
  }

dot[index].classList.add("active");
  }

 function nextImage() {
  current++;
  if(current>=image.length){
    current=0;
  }
  showImage(current)
 }

 function setImage(index){
  current=index;
  showImage(index);
 }

 setInterval(nextImage,3000);
 showImage(0);
 </script>
