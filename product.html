<main>

 <div class="filter-bar">
  <!-- 左边分类 -->
<div class="sub-category">
  <button class="filter-btn active" onclick="selectType(this,'all')">All</button>

<div class="container">

  <div class="card-grid" id="product-list"></div>

  <div id="no-item">No Item</div>

<!-- 分页按钮 -->

<button onclick="prevPage()">⬅</button>
<!-- ⭐ 页码显示 -->

<!-- ⭐ 下拉跳页 -->
 <select id="pageSelect" onchange="jumpToPage()"></select>

<button onclick="nextPage()"> ➡</button>

<script>
const noItem=document.getElementById("no-item");
let currentIndex=0;
let currentType="all";
let currentPage=1;
const perPage=20;

const categories=[
  "ALL",
  "Grand Archive",
  "Pokemon Tcg",
  "One Piece Tcg",
  "Union Arena"
];

const product={
  "Grand Archive":[
  {name:"A",type:"box",price:"RM",img:""},
  {name:"B",type:"card",price:"RM",img:""},
  {name:"C",type:"box",price:"RM",img:""},
  {name:"D",type:"card",price:"RM",img:""},
  {name:"E",type:"box",price:"RM",img:""},
  {name:"F",type:"card",price:"RM",img:""}
],
  "Pokemon Tcg":[
    {name:"G",type:"box",price:"RM",img:""},
    {name:"H",type:"card",price:"RM",img:""},
     {name:"I",type:"box",price:"RM",img:""},
    {name:"J",type:"card",price:"RM",img:""},
     {name:"K",type:"box",price:"RM",img:""},
    {name:"L",type:"card",price:"RM",img:""}
],
  "One Piece Tcg":[
    {name:"M",type:"box",price:"RM",img:""},
    {name:"N",type:"card",price:"RM",img:""},
     {name:"O",type:"box",price:"RM",img:""},
    {name:"P",type:"card",price:"RM",img:""},
     {name:"Q",type:"box",price:"RM",img:""},
    {name:"R",type:"card",price:"RM",img:""}
],
  "Union Arena":[
    {name:"S",type:"box",price:"RM",img:""},
    {name:"T",type:"card",price:"RM",img:""},
     {name:"U",type:"box",price:"RM",img:""},
    {name:"V",type:"card",price:"RM",img:""},
     {name:"W",type:"box",price:"RM",img:""},
    {name:"X",type:"card",price:"RM",img:""}
  ]
};

// 切换选中
function selectCategory(index){
  currentIndex=index;
  currentType="all";
  currentPage=1;
  updateActive();

  // 🔥 加这段（重置下面按钮）
document.querySelectorAll(".filter-btn").forEach(b=>{
  b.classList.remove("active");
});
document.querySelector(".filter-btn").classList.add("active");

  showProduct();
}

// 左右箭头
function next(){
  currentIndex++;
  if(currentIndex>=categories.length){
    currentIndex=0;
  }
  currentType = "all";
  currentPage=1;

updateActive();
// 🔥 重置按钮UI（关键）
document.querySelectorAll(".filter-btn").forEach(b=>{
b.classList.remove("active");
});
document.querySelector(".filter-btn").classList.add("active");

showProduct();
}

function prev(){
  currentIndex--;
  if(currentIndex<0){
    currentIndex=categories.length-1;
  }
  currentType = "all";
  currentPage=1;

updateActive();
// 🔥 重置按钮UI（关键）
document.querySelectorAll(".filter-btn").forEach(b=>{
b.classList.remove("active");
});
document.querySelector(".filter-btn").classList.add("active");

showProduct();
}

function selectType(btn,type){
  // 1️⃣ 记录当前分类
  currentType=type;
  currentPage=1;
  render();

    // 2️⃣ 切换按钮高亮
    document.querySelectorAll(".filter-btn").forEach(b=>{
      b.classList.remove("active");
    });

    btn.classList.add("active");
  }

  function render(){
    showProduct();
  }

// 更新高亮
function updateActive(){
  let items=document.querySelectorAll(".logo-item");
  
  items.forEach(item=>item.classList.remove("active","near"));
  items[currentIndex].classList.add("active");

    // 左边
    let prevIndex=currentIndex-1;
    if(prevIndex<0){
      prevIndex=items.length-1;
    }
    items[prevIndex].classList.add("near");

     // 右边
     let nextIndex=currentIndex+1;
     if(nextIndex>=items.length){
      nextIndex=0;
     }
     items[nextIndex].classList.add("near");
}


// 显示商品
function getFilteredProducts(){
  let category=categories[currentIndex];
  let list=[];

 let html = ""; 

  if(category==="ALL"){

 Object.values(product).forEach(arr=>{
  list=list.concat(arr);
 });

 } else {
  list=product[category];
 }
const keyword=
document
.getElementById("searchInput")
.value
.toLowerCase();

return list.filter(p=>{

  // 分类过滤
  const matchType=
  currentType==="all" ||
  p.type===currentType;

  // 搜索过滤
  const matchSearch=
  p.name
  .toLowerCase()
  .includes(keyword);

  return matchType && matchSearch;
});
}

// 显示商品（🔥唯一渲染函数）
function showProduct(){
  let list=getFilteredProducts();

  let totalPages=
  Math.max(1, Math.ceil(list.length/perPage));

  let start =(currentPage-1)*perPage;
  let end =start+perPage;
  let currentItems=list.slice(start,end);

   let html = ""; 

   // 假设 currentItems 是你筛选后的商品
   if(currentItems.length===0){
    noItem.style.display="block"; // 显示 NO ITEM
   }else{
    noItem.style.display="none";// 隐藏
   }

// 正常渲染商品
  currentItems.forEach(p=>{
    html+=`<div class="card">
      <img src="${p.img}" class="product-img">
      <div class="product-name">${p.name}</div>
      <div class="product-price">${p.price}</div>

       <!-- ⭐ 数量控制 -->
       <div class="qty-box">
        <button onclick="changeQty(this,-1)">-</button>
        <span class="qty">1</span>
        <button onclick="changeQty(this,1)">+</button>
      </div>
      
      <button class="buy-btn">Buy Now</button>
      <button class="add-to-cart">Add to Cart</button>

      </div>
      `;
  });
 
  document.getElementById("product-list").innerHTML=html;
  document.getElementById("pageInfo").innerText=
  `${currentPage}/${totalPages}`;

  updatePageInfo();
}

// 下一页
function nextPage(){
  let list=getFilteredProducts();
  let totalPages=Math.ceil(list.length/perPage);

  if(currentPage<totalPages){
    currentPage++;
    showProduct();
  }
}

// 上一页
function prevPage(){
 currentPage=Math.max(1,currentPage-1);
    showProduct();
  }

function jumpToPage(){
  let page=parseInt(document.getElementById("pageSelect").value);
  currentPage=page;
  showProduct();
}

function updatePageInfo(){
  let list=getFilteredProducts();
  let totalPages=Math.ceil(list.length/perPage);

  // 显示 1 / 10
  document.getElementById("pageInfo").innerText= 
  `${currentPage}/${totalPages}`;

  // 下拉框
  let select=document.getElementById("pageSelect");
  select.innerHTML="";

  for(let i=1; i<=totalPages;i++){
    select.innerHTML+=`
    <option value="${i}"${i===currentPage? 'selected':""}>
      ${i}
      </option>
      `;
  }
}

function changeQty(btn,value){
  let qtySpan=btn.parentElement.querySelector(".qty");
  let qty=parseInt(qtySpan.innerText);
  qty+=value;

  if(qty<1)qty=1;

  qtySpan.innerText=qty;
}

/* =========================
   SEARCH BUTTON
========================= */
document
.getElementById("searchBtn")
.addEventListener("click",()=>{

  currentPage=1;
  showProduct();

});

/* =========================
   ENTER SEARCH
========================= */
document
.getElementById("searchInput")
.addEventListener("keypress",function(e){

  if(e.key==="Enter"){

    currentPage=1;
    showProduct();
  }
})

  // 初始加载
showProduct();
</script>
